name: CI/CD Pipeline

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

env:
  NODE_VERSION: '22'

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────
  # 1. Lint & Security Audit
  # ────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Security
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: 📦 Install backend dependencies
        run: npm ci
        working-directory: ./backend

      - name: 📦 Install frontend dependencies
        run: npm ci
        working-directory: ./frontend

      - name: 🔒 Security audit (Backend)
        run: npm audit --audit-level=critical
        working-directory: ./backend
        continue-on-error: true

      - name: 🔒 Security audit (Frontend)
        run: npm audit --audit-level=critical
        working-directory: ./frontend
        continue-on-error: true

      - name: 🔍 Check for hardcoded secrets
        run: |
          echo "🔍 Scanning for potential secrets..."
          if grep -rn "password.*=.*['\"]" --include="*.js" --include="*.jsx" \
             --exclude-dir=node_modules --exclude="*.example" . | \
             grep -v "your_password" | grep -v "process.env" | grep -v "test_"; then
            echo "⚠️ Warning: Potential hardcoded secrets found!"
          else
            echo "✅ No hardcoded secrets detected"
          fi

  # ────────────────────────────────────────────
  # 2. Test
  # ────────────────────────────────────────────
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: academic_portal_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install backend dependencies
        run: npm ci
        working-directory: ./backend

      - name: 🧪 Run backend tests
        run: npm run test:ci
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/academic_portal_test
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-for-ci
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: test

  # ────────────────────────────────────────────
  # 3. Build
  # ────────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install frontend dependencies
        run: npm ci
        working-directory: ./frontend

      - name: 🏗️ Build frontend
        run: npm run build
        working-directory: ./frontend

      - name: 📊 Check bundle size
        run: |
          echo "📊 Build output size:"
          du -sh dist/
          echo ""
          echo "📁 File breakdown:"
          find dist/ -type f \( -name "*.js" -o -name "*.css" \) | \
            xargs ls -lh | awk '{print $5, $9}'
        working-directory: ./frontend

      - name: 📦 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7


