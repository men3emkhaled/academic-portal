name: CI/CD Pipeline

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

env:
  NODE_VERSION: '22'
  REGISTRY_IMAGE_BACKEND: ${{ secrets.DOCKER_USERNAME }}/academic-portal-backend
  REGISTRY_IMAGE_FRONTEND: ${{ secrets.DOCKER_USERNAME }}/academic-portal-frontend

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── 1. Lint & Security ───────────────────
  lint:
    name: 🔍 Lint & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
      - run: npm ci
        working-directory: ./backend
      - run: npm ci
        working-directory: ./frontend
      - run: npm audit --audit-level=critical
        working-directory: ./backend
        continue-on-error: true
      - run: npm audit --audit-level=critical
        working-directory: ./frontend
        continue-on-error: true
      - name: 🔍 Check for hardcoded secrets
        run: |
          if grep -rn "password.*=.*['\"]" --include="*.js" --include="*.jsx" \
             --exclude-dir=node_modules --exclude="*.example" . | \
             grep -v "your_password" | grep -v "process.env" | grep -v "test_"; then
            echo "⚠️ Potential hardcoded secrets found!"
          else
            echo "✅ No hardcoded secrets detected"
          fi

  # ─── 2. Test ───────────────────────────────
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: academic_portal_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: ./backend
      - run: npm run test:ci
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/academic_portal_test
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-for-ci
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: test

  # ─── 3. Build ──────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: ./frontend
      - run: npm run build
        working-directory: ./frontend
      - name: 📊 Check bundle size
        run: |
          du -sh dist/
          find dist/ -type f \( -name "*.js" -o -name "*.css" \) | \
            xargs ls -lh | awk '{print $5, $9}'
        working-directory: ./frontend
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7

  # ─── 4. Docker Build & Push ────────────────
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: 🏷️ Generate tags
        id: meta
        run: echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY_IMAGE_BACKEND }}:latest
            ${{ env.REGISTRY_IMAGE_BACKEND }}:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY_IMAGE_FRONTEND }}:latest
            ${{ env.REGISTRY_IMAGE_FRONTEND }}:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 5. Deploy Production (Railway) ────────
  deploy:
    name: 🚀 Deploy Production
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment: production
    steps:
      - name: 🚀 Trigger Railway deploy
        run: |
          curl -X POST https://backboard.railway.app/webhooks/v1/${{ secrets.RAILWAY_DEPLOY_WEBHOOK }}/deploy
      - name: 🏥 Health check
        run: |
          sleep 30
          curl -sf ${{ secrets.PRODUCTION_URL }}/api/health && echo "✅ Healthy" || echo "⚠️ Health check skipped"

  # ─── 6. Deploy Staging (develop branch) ────
  deploy-staging:
    name: 🚀 Deploy Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging
    steps:
      - name: 🚀 Trigger Railway staging deploy
        run: |
          curl -X POST https://backboard.railway.app/webhooks/v1/${{ secrets.RAILWAY_STAGING_WEBHOOK }}/deploy

  # ─── 7. Release & Tag ──────────────────────
  release:
    name: 🏷️ Create Release
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: 📦 Read version
        id: version
        run: |
          VERSION=$(node -p "require('./backend/package.json').version")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
      - name: 🏷️ Create Git tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "v${{ steps.version.outputs.version }}-${{ github.run_number }}" \
            -m "Release v${{ steps.version.outputs.version }}-${{ github.run_number }}"
          git push origin "v${{ steps.version.outputs.version }}-${{ github.run_number }}"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}-${{ github.run_number }}"
          name: "Release v${{ steps.version.outputs.version }}-${{ github.run_number }}"
          generate_release_notes: true