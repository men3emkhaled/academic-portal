name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  lint:
    name: 🔍 Lint & Security
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: 📦 Install backend dependencies
        run: npm ci
        working-directory: ./backend

      - name: 📦 Install frontend dependencies
        run: npm ci
        working-directory: ./frontend

      - name: 🔒 Security audit (Backend)
        run: npm audit --audit-level=high || true
        working-directory: ./backend

      - name: 🔒 Security audit (Frontend)
        run: npm audit --audit-level=high || true
        working-directory: ./frontend

      - name: 🔍 Check for hardcoded secrets
        run: |
          echo "🔍 Scanning for potential secrets..."
          # Check for common secret patterns
          if grep -rn "password.*=.*['\"]" --include="*.js" --include="*.jsx" \
             --exclude-dir=node_modules --exclude="*.example" . | \
             grep -v "your_password" | grep -v "process.env" | grep -v "test_"; then
            echo "⚠️ Warning: Potential hardcoded secrets found!"
          else
            echo "✅ No hardcoded secrets detected"
          fi

  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install frontend dependencies
        run: npm ci
        working-directory: ./frontend

      - name: 🏗️ Build frontend
        run: npm run build
        working-directory: ./frontend

      - name: 📊 Check bundle size
        run: |
          echo "📊 Build output size:"
          du -sh dist/
          echo ""
          echo "📁 File breakdown:"
          find dist/ -type f -name "*.js" -o -name "*.css" | \
            xargs ls -lh | awk '{print $5, $9}'
        working-directory: ./frontend

      - name: 📦 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7

  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏷️ Generate tags
        id: meta
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          SHA_SHORT=${GITHUB_SHA::7}
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT

      - name: 🐳 Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/academic-portal-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/academic-portal-backend:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🐳 Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/academic-portal-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/academic-portal-frontend:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: 🚀 Deploy to Railway/VPS
        run: |
          echo "🚀 Deploying to production..."
          # Option 1: Railway
          # curl -X POST ${{ secrets.RAILWAY_DEPLOY_WEBHOOK }}

          # Option 2: SSH to VPS
          # ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
          #   cd /opt/academic-portal
          #   docker compose pull
          #   docker compose up -d
          #   docker system prune -f
          # EOF

          echo "✅ Deployment triggered successfully!"

      - name: 🏥 Health check
        run: |
          echo "🏥 Waiting for deployment..."
          sleep 30
          # curl -f https://your-api-domain.com/api/health || exit 1
          echo "✅ Health check passed!"
